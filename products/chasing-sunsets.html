<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C'monThread | Product Details</title>
  <meta name="description" content="C'monThread product details page." />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../css/product-details.css" />
</head>
<body>

  <header class="site-header">
    <nav class="navbar navbar-expand-lg navbar-light bg-transparent">
      <div class="container">
        <a class="navbar-brand navbar-brand--logo" href="../index.html">
          <img src="../images/Logo.jpg" alt="C'monThread logo" class="brand-logo">
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="mainNav">
          <ul class="navbar-nav align-items-lg-center">
            <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="../productlist.html">Products</a></li>
            <li class="nav-item">
              <a class="nav-link" href="../login/login.html">Login</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="../cart.html">Cart (<span id="cartCount">0</span>)</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section class="product-details">
      <div class="container">
        <div class="row g-5 align-items-start">
          <div class="col-lg-6">
            <div class="product-media">
              <img id="productImage" src="" alt="" class="product-image img-fluid">
            </div>
          </div>

          <div class="col-lg-6">
            <div class="product-info">
              <p class="text-muted product-category" id="productCategory">Collection</p>
              <h1 id="productName">Product Name</h1>
              <p class="product-price" id="productPrice">₱0</p>

              <p class="product-summary" id="productDescription"></p>

              <div class="detail-block">
                <h2>Product Features</h2>
                <ul class="feature-list" id="productFeatures"></ul>
              </div>

              <div class="detail-block">
                <h2>Size</h2>
                <div class="option-group" id="sizeOptions">
                  <button type="button" class="option-btn active" data-size="Small">Small</button>
                  <button type="button" class="option-btn" data-size="Medium">Medium</button>
                  <button type="button" class="option-btn" data-size="Large">Large</button>
                  <button type="button" class="option-btn" data-size="XL">XL</button>
                </div>
              </div>

              <div class="detail-block">
                <h2>Quantity</h2>
                <div class="quantity-control">
                  <button type="button" class="qty-btn" id="qtyMinus">−</button>
                  <span id="quantityValue">1</span>
                  <button type="button" class="qty-btn" id="qtyPlus">+</button>
                </div>
              </div>

              <div class="detail-actions">
                <button type="button" class="btn btn-dark add-to-cart-btn" id="addToCartBtn">
                  Add to Cart
                </button>
                <a href="../cart.html" class="btn btn-outline-dark">
                  View Cart
                </a>
              </div>

              <p class="stock-note" id="stockNote">
                This product is available for simulated checkout only.
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="product-details-info">
      <div class="container">
        <div class="row g-4">
          <div class="col-lg-6">
            <div class="info-card">
              <h2>Details</h2>
              <p id="productDetailsText"></p>
            </div>
          </div>

          <div class="col-lg-6">
            <div class="info-card">
              <h2>Material & Care</h2>
              <ul id="materialList" class="material-list"></ul>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 C'monThread. All rights reserved.</p>
    </div>
  </footer>


  <!-- Shared site JS -->
  <script src="../js/main.js"></script>

  <!-- Page-specific JS -->
  <script src="../js/product-details.js"></script>
</body>
</html>
