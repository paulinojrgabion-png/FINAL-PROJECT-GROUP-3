<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site | Cart</title>
  <meta name="description" content="Shopping cart page for the Site e-commerce prototype." />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="cartStyles.css" />
</head>
<body>

  <header class="site-header">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Site</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item">
              <a class="nav-link active" href="cart.html">
                Cart (<span id="cartCount">0</span>)
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="py-5">
    <div class="container">
      <h1 class="h2 fw-bold mb-4">Shopping Cart</h1>

      <div class="row g-4">
        <div class="col-lg-8">
          <div class="card">
            <div class="card-body">
              <div id="cartItems">
                <!-- Cart items will be inserted here -->
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card">
            <div class="card-body">
              <h2 class="h5 fw-bold">Order Summary</h2>
              <div class="d-flex justify-content-between mb-2">
                <span>Total</span>
                <strong id="cartTotal">₱0</strong>
              </div>

              <button class="btn btn-dark w-100 mb-2" id="checkoutBtn">Checkout Simulation</button>
              <a href="products.html" class="btn btn-outline-dark w-100">Continue Shopping</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-4 border-top">
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 Site. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
